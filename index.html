<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="input-row">
            <div class="field-group">
                <input type="text" id="num1" class="input_field" placeholder="Число 1">
                <span class="calculator__error" id="error1"></span>
            </div>

            <select id="operation" class="operations">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>

            <div class="field-group">
                <input type="text" id="num2" class="input_field" placeholder="Число 2">
                <span class="calculator__error" id="error2"></span>
            </div>
        </div>

        <button id="calculate">подсчитать</button>

        <div class="calculator__history" id="history"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
